<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Boda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animación del sobre -->
  <div class="envelope">
    <div class="flap"></div>
    <div class="letter">
      <h1>Ximena & Enrique</h1>
      <p>¡Nos casamos!</p>
      <p>28 de Noviembre, 2026 · Querétaro, MX</p>
      <button onclick="openInvitation()">Abrir invitación</button>
    </div>
  </div>

  <!-- Contenido oculto que aparece al abrir -->
  <main id="invitation" class="hidden">
    <!-- Contador -->
    <section class="countdown">
      <h2>Faltan...</h2>
      <div id="timer"></div>
    </section>

    <!-- Detalles -->
    <section class="details">
      <h2>Detalles del evento</h2>
      <p>Ceremonia Religiosa: 4:00 PM </p>
      <p>Recepción: 5:00 PM </p>
      <p>Fiesta: 6:00 PM </p>
    </section>

    <!-- Galería -->
    <section class="gallery">
      <h2>Nuestros momentos</h2>
      <div class="photos">
        <img src="foto1.jpg" alt="Foto 1">
        <img src="foto2.jpg" alt="Foto 2">
        <img src="foto3.jpg" alt="Foto 3">
      </div>
    </section>

    <!-- Mapa -->
    <section class="map">
      <h2>Ubicación</h2>
      <iframe src="<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3734.780819733161!2d-100.12685712503468!3d20.597006602468262!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d36f824604bcf3%3A0xe37372749fda216e!2sVi%C3%B1edo%20Tierra%20De%20Alonso!5e0!3m2!1ses!2smx!4v1773255892297!5m2!1ses!2smx" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" 
              width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- RSVP -->
    <section class="rsvp">
      <h2>Confirma tu asistencia</h2>
      <iframe src="https://docs.google.com/forms/d/e/TUFORMULARIO/viewform?embedded=true"
              width="100%" height="600" frameborder="0">Cargando…</iframe>
    </section>

    <!-- Cierre -->
    <section class="closing">
      <h2>Gracias por acompañarnos</h2>
      <p>Con amor, Ximena & Enrique</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
